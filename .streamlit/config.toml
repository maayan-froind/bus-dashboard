[theme]
# Material Design 3 inspired palette
base = "light"
primaryColor = "#1a73e8"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f1f3f4"
textColor = "#202124"
font = "sans serif"

# Runs fine locally and on Streamlit Cloud; these settings make it behave
# correctly behind the Azure App Service reverse proxy + Easy Auth.
[server]
headless = true
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
